<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vilnius Go — Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
<header>
  
  <!-- header как на других страницах -->
</header>

<main class="container">
  <h1 class="hero-title">Guess the Number</h1>

  <article class="card form">
    <p>I chose a number from <b>1 to 100</b>.</p>

    <label>
      Your guess:
      <input type="number" id="guessInput" min="1" max="100">
    </label>

    <button class="btn primary" id="guessBtn">Guess</button>

    <p id="message"></p>

    <p>Attempts: <span id="attempts">0</span></p>
    <p>Attempts left: <span id="left">10</span></p>

    <h3>History</h3>
    <ul id="history" class="list"></ul>
  </article>
</main>

<script src="js/game.js"></script>
</body>
</html>
