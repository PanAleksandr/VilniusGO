<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vilnius Go — Settings</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
<header>
  <div class="container nav">
    <div class="brand">
      <a href="index.html"><img src="img/VG1.png" alt="Vilnius Go logo" class="logo" /></a>
      <span id="main-title">Vilnius Go</span>
    </div>
    <!-- 1) Checkbox (paslėptas, naudojamas atidaryti/uždaryti meniu) -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle" />

    <!-- 2) Hamburger (buterbrodas) -->
    <label for="nav-toggle" class="nav-burger" aria-label="Open menu">
      <span></span>
    </label>

  
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="about.html">About</a>
      <a href="register.html">Register</a>
      <a href="contact.html">Contact</a>
      <a class="active" href="settings.html">Settings</a>
      <a href="news.html">News</a>
    </nav>

    <a href="#" class="btn primary" aria-disabled="true" onclick="return false;">Login</a>
  </div>
</header>

<main class="container">
  <section class="section">
    <h1 class="hero-title">Settings</h1>

    <article class="card form">
      <h3>Theme</h3>

      <!-- 1) Background -->
      <label>
        Background mode:<br>
        <select id="bgMode">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </label>

      <!-- 2) Title color -->
      <label>
        Headings color:<br>
        <input type="color" id="titleColor" value="#f3e6e6">
      </label>

      <!-- 3) Title size -->
      <label>
        Headings size:<br>
        <input type="range" id="titleSize" min="20" max="60" value="38">
        <span id="titleSizeValue">38px</span>
      </label>
    </article>

  </section>



<script src="js/settings.js"></script>
</body>
</html>
