<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vilnius Go — Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
<header>
  <div class="container nav">
    <div class="brand">
      <a href="index.html"><img src="img/VG1.png" alt="" class="logo" /></a>
      <span id="main-title">Vilnius Go</span>
    </div>
    <!-- 1) Checkbox (paslėptas, naudojamas atidaryti/uždaryti meniu) -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle" />

    <!-- 2) Hamburger (buterbrodas) -->
    <label for="nav-toggle" class="nav-burger" aria-label="Open menu">
      <span></span>
    </label>


    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="about.html">About</a>
      <a class="active" href="register.html">Register</a>
      <a href="contact.html">Contact</a>
      <a href="settings.html">Settings</a>
      <a href="news.html">News</a>
    </nav>

    <a href="#" class="btn primary">Login</a>
  </div>
</header>

<main class="container">
  <h1 class="hero-title">Register — sign up</h1>

 
    <form id="registerForm" class="card form" action="#" method="post">



      <h3>Create your account</h3>

      <!-- 2 columns: Full name + Email -->
      <div class="grid-2">
        <label>
          Full name<br>
          <input type="text" name="name" placeholder="Aleksandr Michalovskij" required>
        </label>

        <label>
          Email<br>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
      </div>

      <!-- 2 columns: Phone + Age -->
      <div class="grid-2">
        <label>
          Phone<br>
          <input type="tel" name="tel" placeholder="+370 6xx xxxx">
        </label>

        <label>
          Age<br>
          <input type="number" name="age" placeholder="18" min="7" max="90">
        </label>
      </div>

      <!-- 2 columns: Start date + About you -->
      <div class="grid-2">
        <label>
          Start date<br>
          <input type="date" name="start">
        </label>

        <label>
          About you<br>
          <textarea name="about" rows="5" placeholder="What's your running goal this season?"></textarea>
        </label>
      </div>

      <!-- Profile photo -->
       <div class="gridphoto">
       <div class="grid-2">
      <label>
        Profile photo<br>
        <input type="file" name="avatar" accept="image/*">
      </label>
</div></div>
      <!-- Terms -->
      <label>
        <input type="checkbox" name="terms" required>
        I agree to the Terms
      </label>

      <!-- Buttons -->
      <button class="btn primary" type="submit">Create account</button>
      <button class="btn" type="reset">Clear</button>

    </form>
  
</main>

<footer>
  <div class="container">© 2025 Vilnius Go.</div>
</footer>
<script src="js/app.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
